<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Power-Up Designer v2.8</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; --break: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        
        .item-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; transition: 0.2s; }
        .item-card.break { border-left-color: var(--break); }
        
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 4px; }
        
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #444; color: #ff5252; border: none; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; z-index: 10; }
        .remove-btn:hover { background: #ff5252; color: white; }
        
        /* Main Canvas */
        .main { flex-grow: 1; background: #0a0a0a; overflow: auto; position: relative; }
        #visualizer { min-width: 3000px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; position: sticky; bottom: 0; background: var(--panel); padding-top: 10px; }
        button.action { border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.2s; }
        .btn-rail { background: var(--accent); color: #000; }
        .btn-break { background: var(--break); color: #000; }
        .btn-rail:hover, .btn-break:hover { opacity: 0.8; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    <div id="itemList"></div>
    <div class="btn-group">
        <button class="action btn-rail" onclick="addItem('rail')">+ VOLTAGE RAIL</button>
        <button class="action btn-break" onclick="addItem('break')">+ DRAW BREAK</button>
    </div>
</div>

<div class="main">
    <svg id="visualizer" width="3000" height="1000"></svg>
</div>

<script>
    // Initial State
    let sequence = [
        { type: 'rail', id: 'r1', name: '12V_VIN', delay: 0, rise: 5, color: '#4fc3f7' },
        { type: 'break', id: 'b1', duration: 300, visualWidth: 20 },
        { type: 'rail', id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, color: '#81c784' }
    ];

    function addItem(type) {
        const id = 'id' + Math.random().toString(36).substr(2, 5);
        if (type === 'rail') {
            sequence.push({ type: 'rail', id, name: 'NEW_RAIL', delay: 10, rise: 5, color: '#ba68c8' });
        } else {
            sequence.push({ type: 'break', id, duration: 200, visualWidth: 20 });
        }
        updateUI();
    }

    function removeItem(id) {
        sequence = sequence.filter(i => i.id !== id);
        updateUI();
    }

    function updateVal(id, key, val) {
        const item = sequence.find(i => i.id === id);
        if (item) {
            item[key] = (typeof item[key] === 'string') ? val : (parseFloat(val) || 0);
            render();
        }
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        sequence.forEach(item => {
            const card = document.createElement('div');
            card.className = `item-card ${item.type}`;
            if (item.type === 'rail') {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <input type="text" value="${item.name}" oninput="updateVal('${item.id}', 'name', this.value)">
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>Delay (ms)</label><input type="number" value="${item.delay}" oninput="updateVal('${item.id}', 'delay', this.value)"></div>
                        <div style="flex:1"><label>Rise (ms)</label><input type="number" value="${item.rise}" oninput="updateVal('${item.id}', 'rise', this.value)"></div>
                    </div>
                    <label>Color</label><input type="color" value="${item.color}" oninput="updateVal('${item.id}', 'color', this.value)">`;
            } else {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <div style="font-weight:bold; color:var(--break); font-size:0.7rem">CURVY BREAK</div>
                    <div style="display:flex;gap:5px">
                        <div style="flex:1"><label>Duration (ms)</label><input type="number" value="${item.duration}" oninput="updateVal('${item.id}', 'duration', this.value)"></div>
                        <div style="flex:1"><label>Width (px)</label><input type="number" value="${item.visualWidth}" oninput="updateVal('${item.id}', 'visualWidth', this.value)"></div>
                    </div>`;
            }
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        svg.innerHTML = '';
        
        const SCALE = 5, LANE_H = 100, X_OFF = 160;
        const railCount = sequence.filter(i => i.type === 'rail').length;
        const totalHeight = (railCount + 1) * LANE_H + 50;
        svg.setAttribute('height', totalHeight);

        // --- STEP 1: CALCULATE GEOMETRY ---
        // We need to know where everything is before we draw, so layers work.
        let currentX = X_OFF;
        let railIndex = 0;
        let drawCommands = [];
        let breakCommands = [];

        sequence.forEach((item) => {
            if (item.type === 'break') {
                breakCommands.push({ x: currentX, width: item.visualWidth, ms: item.duration });
                currentX += item.visualWidth;
            } else {
                const yBase = (railIndex + 1) * LANE_H + 50;
                const rStart = currentX + (item.delay * SCALE);
                const rEnd = rStart + (item.rise * SCALE);
                
                drawCommands.push({
                    y: yBase,
                    start: rStart,
                    end: rEnd,
                    color: item.color,
                    name: item.name,
                    delay: item.delay,
                    anchorX: currentX
                });
                
                currentX = rEnd;
                railIndex++;
            }
        });

        // --- STEP 2: DRAW SIGNAL TRACES (Bottom Layer) ---
        drawCommands.forEach(cmd => {
            // Draw the full trace (low -> rise -> high)
            // It starts from the absolute left of the chart
            const pathData = `M ${X_OFF},${cmd.y} L ${cmd.start},${cmd.y} L ${cmd.end},${cmd.y-40} L 2800,${cmd.y-40}`;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("stroke", cmd.color);
            path.setAttribute("stroke-width", "3");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-linecap", "round");
            svg.appendChild(path);

            // Add Text Labels
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", "15");
            txt.setAttribute("y", cmd.y - 10);
            txt.setAttribute("fill", cmd.color);
            txt.setAttribute("font-size", "14");
            txt.setAttribute("font-weight", "bold");
            txt.textContent = cmd.name;
            svg.appendChild(txt);

            // Add Timing Arrows
            if (cmd.delay > 0) {
                drawArrow(svg, cmd.anchorX, cmd.start, cmd.y - 15, `${cmd.delay}ms`, "#ffea00");
            }
        });

        // --- STEP 3: DRAW BREAKS (Top Layer) ---
        // This "masks" the lines underneath
        breakCommands.forEach(b => {
            drawCurvyBreak(svg, b.x, b.width, b.ms, totalHeight);
        });
    }

    function drawCurvyBreak(svg, x, width, ms, height) {
        const midX = x + (width / 2);
        const curveSize = width / 3;
        const gap = width / 5;

        // Masking rectangle (matches background)
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", "0");
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("fill", "#0a0a0a");
        svg.appendChild(rect);

        const createCurve = (offsetX) => {
            let d = `M ${offsetX} 0`;
            for (let y = 0; y < height; y += 100) {
                d += ` C ${offsetX + curveSize} ${y + 25}, ${offsetX - curveSize} ${y + 75}, ${offsetX} ${y + 100}`;
            }
            return d;
        };

        // Two curvy lines
        [midX - gap, midX + gap].forEach(pos => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", createCurve(pos));
            p.setAttribute("stroke", "#888");
            p.setAttribute("stroke-width", "2");
            p.setAttribute("fill", "none");
            svg.appendChild(p);
        });

        // MS Label
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", midX);
        txt.setAttribute("y", "25");
        txt.setAttribute("fill", "#888");
        txt.setAttribute("font-size", "10");
        txt.setAttribute("text-anchor", "middle");
        txt.setAttribute("font-family", "monospace");
        txt.textContent = ms + "ms";
        svg.appendChild(txt);
    }

    function drawArrow(svg, x1, x2, y, txt, col) {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y);
        line.setAttribute("x2", x2); line.setAttribute("y2", y);
        line.setAttribute("stroke", col);
        group.appendChild(line);

        const heads = document.createElementNS("http://www.w3.org/2000/svg", "path");
        heads.setAttribute("d", `M${x1+6} ${y-4} L${x1} ${y} L${x1+6} ${y+4} M${x2-6} ${y-4} L${x2} ${y} L${x2-6} ${y+4}`);
        heads.setAttribute("fill", "none");
        heads.setAttribute("stroke", col);
        group.appendChild(heads);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", (x1 + x2) / 2);
        label.setAttribute("y", y - 8);
        label.setAttribute("fill", col);
        label.setAttribute("font-size", "10");
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("font-weight", "bold");
        label.textContent = txt;
        group.appendChild(label);

        svg.appendChild(group);
    }

    updateUI();
</script>
</body>
</html>
