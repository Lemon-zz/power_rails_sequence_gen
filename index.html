<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power-Up Designer (Axis Break Edition)</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00e676; --text: #cfd8dc; --break: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { color: var(--accent); font-size: 1.1rem; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .item-card { background: #252525; border-radius: 6px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; }
        .item-card.break { border-left-color: var(--break); opacity: 0.9; }
        
        label { display: block; font-size: 0.65rem; color: #888; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: monospace; margin-top: 4px; }
        
        .remove-btn { position: absolute; top: 12px; right: 12px; background: #444; color: #ff5252; border: none; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; z-index: 5; }
        
        .main { flex-grow: 1; background: #0a0a0a; overflow: auto; }
        #visualizer { min-width: 2000px; min-height: 1000px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-rail { background: var(--accent); color: #000; }
        .btn-break { background: var(--break); color: #000; }
        .btn-sec { background: #444; color: #fff; margin-top: 10px; width: 100%; }

        .toggle-container { background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>[ SEQUENCE_EDITOR ]</h2>
    <label class="toggle-container"><input type="checkbox" id="datasheetMode" onchange="render()"> <span>DATASHEET MODE (B&W)</span></label>
    <div id="itemList"></div>
    <div class="btn-group">
        <button class="btn-rail" onclick="addItem('rail')">+ RAIL</button>
        <button class="btn-break" onclick="addItem('break')">+ BREAK</button>
    </div>
    <button class="btn-sec" onclick="exportSVG()">DOWNLOAD SVG</button>
</div>

<div class="main"><svg id="visualizer" width="3000" height="1000"></svg></div>

<script>
    let sequence = [
        { type: 'rail', id: 'r1', name: '12V_VIN', delay: 0, rise: 5, parent: 'none', color: '#4fc3f7' },
        { type: 'break', id: 'b1', duration: 300, visualWidth: 60 },
        { type: 'rail', id: 'r2', name: '3V3_SYS', delay: 20, rise: 10, parent: 'r1', color: '#81c784' }
    ];

    function addItem(type) {
        const id = 'id' + Math.random().toString(36).substr(2, 5);
        if (type === 'rail') {
            const lastRail = [...sequence].reverse().find(i => i.type === 'rail');
            sequence.push({ type: 'rail', id, name: 'NEW_RAIL', delay: 10, rise: 5, parent: lastRail ? lastRail.id : 'none', color: '#ba68c8' });
        } else {
            sequence.push({ type: 'break', id, duration: 200, visualWidth: 50 });
        }
        updateUI();
    }

    function removeItem(id) {
        sequence = sequence.filter(i => i.id !== id);
        updateUI();
    }

    function updateVal(id, key, val) {
        const item = sequence.find(i => i.id === id);
        item[key] = (typeof item[key] === 'string') ? val : (parseFloat(val) || 0);
        render();
    }

    function updateUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        sequence.forEach(item => {
            const card = document.createElement('div');
            card.className = `item-card ${item.type}`;
            if (item.type === 'rail') {
                let opts = `<option value="none">None</option>`;
                sequence.filter(i => i.type === 'rail' && i.id !== item.id).forEach(r => {
                    opts += `<option value="${r.id}" ${item.parent === r.id ? 'selected' : ''}>${r.name}</option>`;
                });
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <input type="text" value="${item.name}" oninput="updateVal('${item.id}', 'name', this.value)">
                    <div style="display:flex;gap:5px"><div style="flex:1"><label>Delay</label><input type="number" value="${item.delay}" oninput="updateVal('${item.id}', 'delay', this.value)"></div>
                    <div style="flex:1"><label>Rise</label><input type="number" value="${item.rise}" oninput="updateVal('${item.id}', 'rise', this.value)"></div></div>
                    <label>After</label><select onchange="updateVal('${item.id}', 'parent', this.value)">${opts}</select>`;
            } else {
                card.innerHTML = `<button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>
                    <div style="font-weight:bold; color:var(--break); font-size:0.8rem">TIME BREAK (//)</div>
                    <div style="display:flex;gap:5px"><div style="flex:1"><label>Duration (ms)</label><input type="number" value="${item.duration}" oninput="updateVal('${item.id}', 'duration', this.value)"></div>
                    <div style="flex:1"><label>Width (px)</label><input type="number" value="${item.visualWidth}" oninput="updateVal('${item.id}', 'visualWidth', this.value)"></div></div>`;
            }
            list.appendChild(card);
        });
        render();
    }

    function render() {
        const svg = document.getElementById('visualizer');
        const isBW = document.getElementById('datasheetMode').checked;
        const colors = { bg: isBW?"#fff":"#0a0a0a", grid: isBW?"#eee":"#222", text: isBW?"#000":"#888", arrow: isBW?"#444":"#ffea00" };
        svg.style.background = colors.bg;
        svg.innerHTML = '';
        
        const SCALE = 5, LANE_H = 80, X_OFF = 150;
        let railPos = {};

        // Calculate actual visual X for each rail considering breaks
        function getVisualX(time, parentId) {
            let x = X_OFF + (time * SCALE);
            sequence.forEach(item => {
                if(item.type === 'break') {
                    // This logic is simplified: in a real app, you'd track the break's "insertion point" in the sequence.
                }
            });
            return x;
        }

        // Simplest logic for current user: Sequential logic with manual offsets
        let currentX = X_OFF;
        const railsOnly = sequence.filter(i => i.type === 'rail');

        sequence.forEach((item, idx) => {
            if(item.type === 'break') {
                // Draw Axis Break across all lanes
                const breakX = currentX + 10;
                svg.innerHTML += `<rect x="${breakX}" y="0" width="${item.visualWidth}" height="100%" fill="${isBW?'#f9f9f9':'#111'}" />`;
                for(let j=0; j<20; j++) {
                    let y = j * 60;
                    svg.innerHTML += `<path d="M ${breakX+item.visualWidth/2-5} ${y+20} L ${breakX+item.visualWidth/2+5} ${y}" stroke="${colors.text}" stroke-width="2"/>`;
                    svg.innerHTML += `<path d="M ${breakX+item.visualWidth/2} ${y+20} L ${breakX+item.visualWidth/2+10} ${y}" stroke="${colors.text}" stroke-width="2"/>`;
                }
                svg.innerHTML += `<text x="${breakX + item.visualWidth/2}" y="35" fill="${colors.text}" font-size="10" text-anchor="middle" font-weight="bold">${item.duration}ms</text>`;
                currentX += item.visualWidth;
            } else {
                const i = railsOnly.indexOf(item);
                const yBase = (i + 1) * LANE_H + 50;
                const rStart = currentX + (item.delay * SCALE);
                const rEnd = rStart + (item.rise * SCALE);
                const stroke = isBW ? "#000" : item.color;
                
                svg.innerHTML += `<text x="15" y="${yBase-5}" fill="${stroke}" font-size="12" font-weight="bold">${item.name}</text>
                    <path d="M ${X_OFF},${yBase} L ${rStart},${yBase} L ${rEnd},${yBase-30} L 2800,${yBase-30}" fill="none" stroke="${stroke}" stroke-width="3" />`;
                
                if(item.delay > 0) drawArrow(svg, currentX, rStart, yBase-15, `${item.delay}ms`, colors.arrow);
                currentX = rEnd;
            }
        });
    }

    function drawArrow(svg, x1, x2, y, txt, col) {
        svg.innerHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" />
            <path d="M${x1+5} ${y-3} L${x1} ${y} L${x1+5} ${y+3}" fill="none" stroke="${col}" />
            <path d="M${x2-5} ${y-3} L${x2} ${y} L${x2-5} ${y+3}" fill="none" stroke="${col}" />
            <text x="${(x1+x2)/2}" y="${y-5}" fill="${col}" font-size="10" text-anchor="middle">${txt}</text>`;
    }

    function exportSVG() { /* Same as previous version */ }
    updateUI();
</script>
</body>
</html>
